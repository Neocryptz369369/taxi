<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Driver Dashboard — SwiftRide</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<header class="navbar">
  <div class="logo">🚖 SwiftRide Driver</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="customer.html">Book a Ride</a>
    <a href="driver.html" class="active">Driver</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<main class="container">
  <h1>Driver Dashboard</h1>

  <div class="card">
    <div class="driver-header">
      <div>
        <h2 id="driverName">Driver: Not logged in</h2>
        <p>Status: <span id="driverStatus" class="status-offline">Offline</span></p>
      </div>
      <button id="toggleStatus" class="btn-primary">Go Online</button>
    </div>

    <form id="driverLoginForm">
      <label>Driver Name</label>
      <input type="text" id="driverNameInput" placeholder="Jane Driver" required/>
      <label>Vehicle Plate</label>
      <input type="text" id="vehiclePlate" placeholder="ABC-1234" required/>
      <button type="submit" class="btn-secondary">Log in as Driver</button>
    </form>
  </div>

  <div class="card">
    <h2>Available Ride Requests</h2>
    <table id="requestsTable">
      <thead><tr><th>#</th><th>Customer</th><th>From</th><th>To</th><th>Fare</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="card">
    <h2>My Trips</h2>
    <table id="myTripsTable">
      <thead><tr><th>#</th><th>Customer</th><th>From</th><th>To</th><th>Fare</th><th>Status</th></tr></thead>
      <tbody></tbody>
    </table>
    <p class="fare">Total Earnings: $<span id="earnings">0.00</span></p>
  </div>
</main>

<footer><p>© 2026 SwiftRide</p></footer>
<script src="js/app.js"></script>
<script src="js/driver.js"></script>
</body>
</html>
