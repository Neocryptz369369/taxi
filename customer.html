<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Book a Ride — SwiftRide</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<header class="navbar">
  <div class="logo">🚖 SwiftRide</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="customer.html" class="active">Book a Ride</a>
    <a href="driver.html">Driver</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<main class="container">
  <h1>Book Your Ride</h1>

  <div class="card">
    <h2>Trip Details</h2>
    <form id="bookingForm">
      <label>Your Name</label>
      <input type="text" id="customerName" required placeholder="John Doe"/>

      <label>Phone Number</label>
      <input type="tel" id="customerPhone" required placeholder="+1 555 123 4567"/>

      <label>Pickup Location</label>
      <input type="text" id="pickup" required placeholder="123 Main St"/>

      <label>Drop-off Location</label>
      <input type="text" id="dropoff" required placeholder="456 Park Ave"/>

      <label>Ride Type</label>
      <select id="rideType">
        <option value="economy" data-rate="1.2">Economy ($1.20/km)</option>
        <option value="standard" data-rate="1.8">Standard ($1.80/km)</option>
        <option value="premium" data-rate="2.5">Premium ($2.50/km)</option>
      </select>

      <label>Estimated Distance (km)</label>
      <input type="number" id="distance" min="1" value="5" required/>

      <p class="fare">Estimated Fare: $<span id="fareEstimate">6.00</span></p>

      <button type="submit" class="btn-primary">Request Ride</button>
    </form>
  </div>

  <div class="card" id="bookingsCard">
    <h2>Your Bookings</h2>
    <table id="bookingsTable">
      <thead>
        <tr><th>#</th><th>From</th><th>To</th><th>Type</th><th>Fare</th><th>Status</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</main>

<footer><p>© 2026 SwiftRide</p></footer>
<script src="js/app.js"></script>
<script src="js/customer.js"></script>
</body>
</html>
