<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard — SwiftRide</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<header class="navbar">
  <div class="logo">🚖 SwiftRide Admin</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="customer.html">Book a Ride</a>
    <a href="driver.html">Driver</a>
    <a href="admin.html" class="active">Admin</a>
  </nav>
</header>

<main class="container">
  <div id="loginPanel" class="card">
    <h2>Admin Login</h2>
    <form id="adminLoginForm">
      <label>Username</label>
      <input type="text" id="adminUser" placeholder="admin" required/>
      <label>Password</label>
      <input type="password" id="adminPass" placeholder="admin123" required/>
      <button class="btn-primary" type="submit">Log In</button>
      <p class="hint">Demo credentials: <b>admin / admin123</b></p>
    </form>
  </div>

  <div id="adminPanel" style="display:none;">
    <h1>Admin Dashboard</h1>

    <div class="stats">
      <div class="stat-box"><h3 id="statRides">0</h3><p>Total Rides</p></div>
      <div class="stat-box"><h3 id="statRevenue">$0</h3><p>Total Revenue</p></div>
      <div class="stat-box"><h3 id="statDrivers">0</h3><p>Drivers</p></div>
      <div class="stat-box"><h3 id="statCustomers">0</h3><p>Customers</p></div>
    </div>

    <div class="card">
      <h2>All Rides</h2>
      <table id="adminRides">
        <thead><tr><th>#</th><th>Customer</th><th>Driver</th><th>From</th><th>To</th><th>Fare</th><th>Status</th><th>Action</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Drivers</h2>
      <table id="adminDrivers">
        <thead><tr><th>#</th><th>Name</th><th>Plate</th><th>Status</th><th>Trips</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Pricing</h2>
      <form id="pricingForm">
        <label>Economy ($/km)</label><input type="number" step="0.1" id="priceEconomy" value="1.2"/>
        <label>Standard ($/km)</label><input type="number" step="0.1" id="priceStandard" value="1.8"/>
        <label>Premium ($/km)</label><input type="number" step="0.1" id="pricePremium" value="2.5"/>
        <button type="submit" class="btn-primary">Save Pricing</button>
      </form>
    </div>

    <button id="logoutBtn" class="btn-secondary">Log Out</button>
  </div>
</main>

<footer><p>© 2026 SwiftRide</p></footer>
<script src="js/app.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
